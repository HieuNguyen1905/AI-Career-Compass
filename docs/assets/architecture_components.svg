  <text x="700" y="145" class="panel-title">FastAPI Backend</text>
  <text x="700" y="170" class="small">Routers, domain logic, AI agent</text>

  <rect x="694" y="205" width="232" height="50" rx="12" class="box blue" />
  <text x="754" y="237" class="label">Auth Router</text>
  <rect x="694" y="275" width="232" height="50" rx="12" class="box blue" />
