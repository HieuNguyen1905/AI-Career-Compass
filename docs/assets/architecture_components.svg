  <text x="1087" y="376" class="small">Profiles</text>

  <rect x="1035" y="472" width="190" height="110" rx="20" class="panel rose" />
  <text x="1076" y="518" class="panel-title">OpenAI</text>
  <text x="1084" y="546" class="small">LLM API</text>

  <path d="M234 180 H310" class="arrow" />
  <path d="M580 300 H660" class="arrow" />
  <path d="M580 510 H660" class="arrow" />
  <path d="M960 298 H1035" class="muted-arrow" />
  <path d="M960 510 H1035" class="arrow" />
  <path d="M810 465 V485" class="muted-arrow" />
  <path d="M810 535 V555" class="muted-arrow" />

  <text x="250" y="166" class="small">uses</text>
  <text x="596" y="286" class="small">REST / Server Actions</text>
