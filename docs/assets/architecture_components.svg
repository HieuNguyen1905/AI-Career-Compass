<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Career Compass - Component Architecture</title>
  <desc id="desc">Sơ đồ kiến trúc component của AI Career Compass gồm người dùng, frontend Next.js, backend FastAPI, data layer và OpenAI API.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe5ee; stroke-width: 2; }
      .panel-title { fill: #0f172a; font: 700 22px Arial, sans-serif; }
      .label { fill: #1e293b; font: 600 17px Arial, sans-serif; }
      .small { fill: #475569; font: 500 14px Arial, sans-serif; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .teal { fill: #ecfdf5; stroke: #14b8a6; }
      .blue { fill: #eff6ff; stroke: #38bdf8; }
      .amber { fill: #fffbeb; stroke: #f59e0b; }
      .rose { fill: #fff1f2; stroke: #fb7185; }
      .arrow { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .muted-arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-muted); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e" />
    </marker>
    <marker id="arrowhead-muted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760" />
  <text x="54" y="58" class="panel-title">AI Career Compass - Component Architecture</text>
  <text x="54" y="84" class="small">Các thành phần chính của MVP Gate G2 và quan hệ giữa frontend, backend, data layer và LLM.</text>

